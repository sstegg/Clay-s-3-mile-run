<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clay's 3-Mile Run</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111d11; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui, sans-serif; color: #fff; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 6px; color: #7ecb5f; }
#wrap { background: #1a2e1a; border-radius: 12px; overflow: hidden; }
#gc { display: block; }
#hud { display: flex; justify-content: space-between; align-items: center; padding: 6px 14px; background: #111d11; }
#hud span { color: #aaa; font-size: 13px; }
#hud strong { color: #7ecb5f; }
#msg { text-align: center; font-size: 15px; font-weight: 500; color: #fff; padding: 8px 0 4px; min-height: 34px; }
#start-btn { display: block; margin: 6px auto 0; padding: 9px 28px; font-size: 14px; border-radius: 8px; cursor: pointer; background: transparent; border: 1px solid rgba(255,255,255,0.3); color: #fff; }
#start-btn:hover { background: rgba(255,255,255,0.1); }
</style>
</head>
<body>
<h1>Clay's 3-Mile Run</h1>
<div id="wrap">
  <div id="hud">
    <span>dist: <strong id="dist-disp">0.00</strong> mi</span>
    <span>pace: <strong id="pace-disp">--:--</strong> /mi</span>
    <span>energy: <strong id="energy-disp">100</strong>%</span>
    <span>score: <strong id="score-disp">0</strong></span>
  </div>
  <canvas id="gc" width="640" height="320"></canvas>
</div>
<div id="msg">space to jump, down arrow to duck</div>
<button id="start-btn">start run</button>

<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GROUND = H - 50;

let state = 'idle', frame, gameTime, score, distance, energy, speedMult;
let player, obstacles, collectibles, clouds, bgX, particles;
let duckHeld = false;

const TOTAL_DIST = 3.0;
const BASE_SPEED = 3.5;

const EVENTS = [
  { dist: 0.3, msg: "a gherkin springs out of a bush!", done: false },
  { dist: 0.6, msg: "uphill! clay's calves are burning...", done: false },
  { dist: 0.8, msg: "sailor jerry's spotted ahead! grab it!", done: false },
  { dist: 1.0, msg: "halfway to mile 1! looking sweaty.", done: false },
  { dist: 1.3, msg: "a dog joins the run uninvited", done: false },
  { dist: 1.5, msg: "mile 1.5 - clay questions all his choices", done: false },
  { dist: 1.8, msg: "gherkin ambush! there's loads of em!", done: false },
  { dist: 2.0, msg: "mile 2! clay's legs have left the chat", done: false },
  { dist: 2.3, msg: "sailor jerry's sighting - second wind!", done: false },
  { dist: 2.7, msg: "final stretch! the finish line awaits!", done: false },
];

function initGame() {
  gameTime = 0; score = 0; distance = 0; energy = 100; speedMult = 1; bgX = 0;
  player = { x: 90, y: GROUND, vy: 0, grounded: true, ducking: false, anim: 0, invincible: 0 };
  obstacles = []; collectibles = []; particles = [];
  clouds = [{x:100,y:40,s:0.6},{x:280,y:25,s:0.9},{x:460,y:55,s:0.7},{x:600,y:30,s:0.5}];
  EVENTS.forEach(e => e.done = false);
  updateHUD();
  spawnObstacle();
  setTimeout(spawnCollectible, 3000);
}

function updateHUD() {
  document.getElementById('dist-disp').textContent = distance.toFixed(2);
  document.getElementById('score-disp').textContent = score;
  document.getElementById('energy-disp').textContent = Math.max(0, Math.round(energy));
  const paceSeconds = gameTime > 0 ? (gameTime / 60) / Math.max(distance, 0.001) * 60 : 0;
  if (distance > 0.05) {
    const m = Math.floor(paceSeconds / 60);
    const s = Math.round(paceSeconds % 60);
    document.getElementById('pace-disp').textContent = m + ':' + (s < 10 ? '0' : '') + s;
  } else {
    document.getElementById('pace-disp').textContent = '--:--';
  }
}

function spawnObstacle() {
  if (state !== 'playing') return;
  const types = ['gherkin', 'gherkin', 'gherkin', 'log', 'lowbar'];
  const type = types[Math.floor(Math.random() * types.length)];
  const isLow = type === 'lowbar';
  obstacles.push({ x: W + 30, type, y: isLow ? GROUND - 45 : GROUND, w: type==='log'?30:22, h: isLow?20:type==='log'?28:30 });
  const nextTime = 1200 + Math.random() * 1800 - Math.min(speedMult * 200, 800);
  setTimeout(spawnObstacle, Math.max(600, nextTime));
}

function spawnCollectible() {
  if (state !== 'playing') return;
  collectibles.push({ x: W + 20, y: GROUND - 50 - Math.random()*60, bob: Math.random()*Math.PI*2, type: Math.random()<0.3?'star':'bottle' });
  setTimeout(spawnCollectible, 4000 + Math.random()*4000);
}

function addParticle(x, y, col) {
  for(let i=0;i<6;i++) particles.push({ x, y, vx:(Math.random()-0.5)*4, vy:-2-Math.random()*3, life:1, col });
}

const keys = {};
document.addEventListener('keydown', e => {
  if(!keys[e.key]) {
    keys[e.key] = true;
    if((e.key===' '||e.key==='ArrowUp') && player && player.grounded && state==='playing') {
      player.vy = -14; player.grounded = false;
    }
  }
  if(e.key==='ArrowDown') duckHeld = true;
  if(['ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; if(e.key==='ArrowDown') duckHeld = false; });

function drawClay(p) {
  if(p.invincible>0 && Math.floor(p.invincible/4)%2===0) return;
  ctx.save();
  ctx.translate(p.x, p.y);
  const duck = p.ducking;
  const legSwing = Math.sin(p.anim*0.25)*10;
  if(!duck) {
    ctx.fillStyle = '#3d2b1f'; ctx.fillRect(-7,-8,6,16); ctx.fillRect(1,-8,6,16);
    ctx.fillStyle = '#5a3e28';
    ctx.beginPath(); ctx.ellipse(-4,8+legSwing,4,6,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(4,8-legSwing,4,6,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f5a623'; ctx.beginPath(); ctx.roundRect(-10,-24,20,18,3); ctx.fill();
    ctx.fillStyle = '#e8961f';
    ctx.beginPath(); ctx.roundRect(-7,8,6,5,2); ctx.fill();
    ctx.beginPath(); ctx.roundRect(1,8,6,5,2); ctx.fill();
    ctx.fillStyle = '#ffe0b2'; ctx.beginPath(); ctx.ellipse(0,-32,9,11,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a1a2e'; ctx.beginPath(); ctx.ellipse(-2,-35,4,5,-0.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font='bold 8px sans-serif'; ctx.fillText('C',-5,-31);
    ctx.fillStyle = '#2c1a0e'; ctx.beginPath(); ctx.ellipse(-2,-30,2.5,3,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(-1.2,-31.5,0.8,0.8,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#c0392b'; ctx.beginPath(); ctx.arc(2,-24,2.5,Math.PI,0); ctx.fill();
  } else {
    ctx.fillStyle = '#f5a623'; ctx.beginPath(); ctx.roundRect(-14,-10,28,12,3); ctx.fill();
    ctx.fillStyle = '#ffe0b2'; ctx.beginPath(); ctx.ellipse(10,-8,8,8,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#2c1a0e'; ctx.beginPath(); ctx.ellipse(10,-8,2.5,3,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(10.8,-9,0.8,0.8,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#3d2b1f'; ctx.fillRect(-12,2,8,8); ctx.fillRect(4,2,8,8);
  }
  ctx.restore();
}

function drawGherkinObs(o) {
  ctx.save(); ctx.translate(o.x, o.y - o.h);
  ctx.fillStyle = '#5a9e3a'; ctx.beginPath(); ctx.ellipse(0,0,11,15,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#3a7a1e'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,-14); ctx.lineTo(0,14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-8,-5); ctx.lineTo(8,-5); ctx.stroke();
  ctx.fillStyle = '#3a7a1e'; ctx.fillRect(-2,-19,4,6);
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(-3,3,2.5,2,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a1a2e'; ctx.beginPath(); ctx.ellipse(-3,3,1.5,1.2,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a1a2e'; ctx.beginPath(); ctx.arc(3,7,3,0,Math.PI); ctx.fill();
  ctx.restore();
}

function drawLog(o) {
  ctx.save(); ctx.translate(o.x, o.y - o.h);
  ctx.fillStyle = '#7a4f2e'; ctx.beginPath(); ctx.roundRect(-15,0,30,28,4); ctx.fill();
  ctx.strokeStyle = '#5a3520'; ctx.lineWidth=1.5;
  for(let i=5;i<25;i+=6) { ctx.beginPath(); ctx.moveTo(-15,i); ctx.lineTo(15,i); ctx.stroke(); }
  ctx.fillStyle = '#a0673a'; ctx.beginPath(); ctx.ellipse(0,0,15,6,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawLowBar(o) {
  ctx.save(); ctx.translate(o.x, o.y);
  ctx.fillStyle = '#c0392b'; ctx.fillRect(-15,-8,30,8);
  ctx.fillStyle = '#922b21'; ctx.fillRect(-15,-8,30,3);
  ctx.fillStyle = '#888'; ctx.fillRect(-3,-20,6,13); ctx.fillRect(-3,-8,6,13);
  ctx.restore();
}

function drawBottleCollect(c) {
  const bob = Math.sin(c.bob)*5;
  ctx.save(); ctx.translate(c.x, c.y+bob);
  ctx.fillStyle = '#c0392b'; ctx.beginPath(); ctx.roundRect(-6,-14,12,22,4); ctx.fill();
  ctx.fillStyle = '#922b21'; ctx.beginPath(); ctx.roundRect(-6,-14,12,10,[4,4,0,0]); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.roundRect(-5,-4,10,10,2); ctx.fill();
  ctx.fillStyle = '#922b21'; ctx.font='bold 4px sans-serif'; ctx.textAlign='center';
  ctx.fillText('SJ',0,4);
  ctx.fillStyle='#888'; ctx.beginPath(); ctx.roundRect(-4,-17,8,5,[2,2,0,0]); ctx.fill();
  ctx.restore();
}

function drawStar(c) {
  const bob = Math.sin(c.bob)*5;
  ctx.save(); ctx.translate(c.x, c.y+bob);
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  for(let i=0;i<5;i++) {
    const a=(i*4*Math.PI/5)-Math.PI/2, ai=(i*4*Math.PI/5+2*Math.PI/5)-Math.PI/2;
    if(i===0) ctx.moveTo(Math.cos(a)*12,Math.sin(a)*12);
    else ctx.lineTo(Math.cos(a)*12,Math.sin(a)*12);
    ctx.lineTo(Math.cos(ai)*5,Math.sin(ai)*5);
  }
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawCloud(c) {
  ctx.save(); ctx.translate(c.x, c.y); ctx.scale(c.s,c.s);
  ctx.fillStyle = '#e8f5e8';
  [[-20,0,20],[0,-12,16],[20,0,18],[40,0,15]].forEach(([x,y,r]) => {
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

function drawBg(scrollX) {
  ctx.fillStyle = '#2d5a1b'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#87ceeb'; ctx.fillRect(0,0,W,GROUND);
  for(let c of clouds) drawCloud(c);
  for(let i=0;i<6;i++) {
    const bx=((i*180-scrollX*0.2)%(W+200)+W+200)%(W+200)-100;
    ctx.fillStyle='#1a4a0a';
    ctx.beginPath(); ctx.moveTo(bx,GROUND); ctx.lineTo(bx-18,GROUND-60); ctx.lineTo(bx+18,GROUND-60); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(bx,GROUND-40); ctx.lineTo(bx-12,GROUND-85); ctx.lineTo(bx+12,GROUND-85); ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle='#3d7a22'; ctx.fillRect(0,GROUND,W,H-GROUND);
  const roadY=GROUND+5;
  ctx.fillStyle='#555'; ctx.fillRect(0,roadY,W,H-roadY);
  ctx.fillStyle='#777';
  for(let i=0;i<8;i++) {
    const lx=((i*90-scrollX*2)%(W+90)+W+90)%(W+90)-45;
    ctx.fillRect(lx-20,roadY+8,40,5);
  }
  const prog=Math.min(distance/TOTAL_DIST,1);
  const barW=W-40;
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(20,8,barW,8);
  ctx.fillStyle='#7ecb5f'; ctx.fillRect(20,8,barW*prog,8);
  ctx.fillStyle='#fff'; ctx.font='10px system-ui';
  ctx.textAlign='left'; ctx.fillText('0',20,28);
  ctx.textAlign='center'; ctx.fillText('1.5mi',W/2,28);
  ctx.textAlign='right'; ctx.fillText('3mi',W-20,28);
  if(distance>=TOTAL_DIST-0.1) {
    ctx.fillStyle='#ffd700'; ctx.fillRect(W-60,GROUND-80,8,80);
    ctx.fillStyle='#c0392b';
    ctx.beginPath(); ctx.moveTo(W-60,GROUND-80); ctx.lineTo(W-10,GROUND-65); ctx.lineTo(W-60,GROUND-50); ctx.closePath(); ctx.fill();
  }
}

function loop() {
  if(state!=='playing') return;
  frame=requestAnimationFrame(loop);
  gameTime++;
  speedMult=1+distance*0.15;
  const spd=BASE_SPEED*speedMult;
  bgX+=spd;
  for(let c of clouds) { c.x-=spd*0.15; if(c.x<-120) c.x=W+80; }
  player.ducking=duckHeld;
  if(!player.grounded) { player.vy+=0.7; player.y+=player.vy; }
  if(player.y>=GROUND) { player.y=GROUND; player.vy=0; player.grounded=true; }
  if(player.grounded&&!player.ducking) player.anim++;
  if(player.invincible>0) player.invincible--;
  distance+=spd/5280*1.8;
  energy=Math.max(0,energy-0.015*speedMult);
  for(let e of EVENTS) { if(!e.done&&distance>=e.dist) { document.getElementById('msg').textContent=e.msg; e.done=true; } }
  for(let i=obstacles.length-1;i>=0;i--) {
    const o=obstacles[i]; o.x-=spd;
    if(o.x<-50) { obstacles.splice(i,1); score+=10; continue; }
    if(player.invincible===0) {
      const ph=player.ducking?12:44, py=player.y-ph;
      const ox=o.x-o.w/2, oy=o.y-o.h;
      if(player.x+10>ox&&player.x-10<ox+o.w&&player.y>oy&&py<o.y) {
        energy=Math.max(0,energy-20); player.invincible=80; obstacles.splice(i,1);
        addParticle(player.x,player.y-20,'#ff4444');
      }
    }
  }
  for(let i=collectibles.length-1;i>=0;i--) {
    const c=collectibles[i]; c.x-=spd; c.bob+=0.06;
    if(c.x<-30){collectibles.splice(i,1);continue;}
    const dx=c.x-player.x,dy=(c.y+Math.sin(c.bob)*5)-player.y;
    if(Math.sqrt(dx*dx+dy*dy)<28) {
      collectibles.splice(i,1);
      if(c.type==='bottle'){energy=Math.min(100,energy+30);score+=50;addParticle(c.x,c.y,'#c0392b');}
      else{score+=25;addParticle(c.x,c.y,'#ffd700');}
    }
  }
  for(let i=particles.length-1;i>=0;i--) {
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life-=0.04;
    if(p.life<=0) particles.splice(i,1);
  }
  score++;
  updateHUD();
  drawBg(bgX);
  for(let o of obstacles){if(o.type==='gherkin')drawGherkinObs(o);else if(o.type==='log')drawLog(o);else drawLowBar(o);}
  for(let c of collectibles) c.type==='bottle'?drawBottleCollect(c):drawStar(c);
  for(let p of particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
  drawClay(player);
  if(distance>=TOTAL_DIST){finishGame();}
}

function finishGame() {
  state='over'; cancelAnimationFrame(frame);
  drawBg(bgX);
  for(let c of collectibles) c.type==='bottle'?drawBottleCollect(c):drawStar(c);
  drawClay(player);
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffd700'; ctx.font='bold 36px system-ui'; ctx.textAlign='center';
  ctx.fillText('3 miles done!',W/2,H/2-30);
  ctx.fillStyle='#7ecb5f'; ctx.font='18px system-ui';
  ctx.fillText('clay survived the run',W/2,H/2+5);
  ctx.fillStyle='#f5a623'; ctx.font='16px system-ui';
  ctx.fillText('score: '+score+'  ·  energy left: '+Math.round(energy)+'%',W/2,H/2+35);
  document.getElementById('msg').textContent="clay earns a sailor jerry's. well deserved.";
  document.getElementById('start-btn').textContent='run again';
  document.getElementById('start-btn').style.display='block';
}

document.getElementById('start-btn').addEventListener('click', () => {
  state='playing';
  document.getElementById('start-btn').style.display='none';
  document.getElementById('msg').textContent="space to jump, down to duck!";
  cancelAnimationFrame(frame);
  initGame();
  loop();
});

drawBg(0);
ctx.fillStyle='#fff'; ctx.font='20px system-ui'; ctx.textAlign='center';
ctx.fillText("Clay's 3-Mile Run",W/2,H/2-10);
ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='14px system-ui';
ctx.fillText('jump gherkins, duck low bars, grab sailor jerrys',W/2,H/2+18);
</script>
</body>
</html>
